<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de acesso ao site pessoal de Matheus Rocha Moreira, estudante de Ciência da Computação no CEUB.">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <meta name="author" content="Matheus Rocha Moreira">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:title" content="Math Moreira - Acesso">
    <meta property="og:description" content="Entre no site pessoal de Matheus Rocha Moreira e conheça o perfil acadêmico e projetos.">
    <meta property="og:image" content="assets/Foto da conta profissional.jpeg">
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Math Moreira - Acesso">
    <meta property="twitter:description" content="Página de acesso ao site pessoal de Matheus Rocha Moreira.">
    <meta property="twitter:image" content="assets/Foto da conta profissional.jpeg">
    <title>Math Moreira - Acesso</title>
    <link rel="canonical" href="index.html">
    <link rel="icon" href="assets/Foto da conta profissional.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="paginicial.css">
</head>
<body>
    <header>
        <figure>
            <img src="assets/Logo Meu Site (sem fundo).png" alt="Logo do Meu Site" class="logo" width="300" height="176" fetchpriority="high" decoding="async">
        </figure>
        <h1>Matheus Rocha Moreira</h1>
    </header>

    <main class="main">
        <section class="login">
            <h2>Acesso</h2>
            <form action="perfil.html" method="get">
                <fieldset>
                    <legend>Informações de Login</legend>
                    
                    <div class="form-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" autocomplete="name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" autocomplete="email" inputmode="email" required>
                    </div>

                    <div class="form-group">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" autocomplete="current-password" required>
                    </div>

                    <div class="form-actions">
                        <button type="reset">Resetar</button>
                        <button type="submit">Continuar</button>
                    </div>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Matheus Rocha Moreira. Todos os direitos reservados.</p>
    </footer>
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Math Moreira",
            "url": "index.html",
            "author": {
                "@type": "Person",
                "name": "Matheus Rocha Moreira"
            },
            "inLanguage": "pt-BR"
        }
    </script>
</body>
</html>
